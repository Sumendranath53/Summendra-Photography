text:`The level of professionalism and artistry is unmatched. From capturing the intricate details of the dress to the grand drone shots of the venue, Sumendra Photography delivered beyond our wild imaginations.`,name:`Vikram & Ananya`,loc:`Luxury Wedding, Goa`},{text:`Every picture is a masterpiece. Sumendra has an incredible eye for storytelling. The emotions captured in the rituals are so pure, it brings tears to our eyes every time we look at them.`,name:`Kabir & Pooja`,loc:`Royal Palace Wedding, Jodhpur`},{text:`We wanted something quiet, candid, and authentic, and Sumendra delivered exactly that. No artificial posing—just pure, raw, and beautiful moments captured in the hills.`,name:`Arjun & Diya`,loc:`Intimate Vows, Mussoorie`},{text:`Shooting in extreme weather in Ladakh was a challenge, but Sumendra's energy and passion kept us going. The frames with the lakes and mountains are spectacular.`,name:`Neel & Shreya`,loc:`Pre-Wedding Session, Ladakh`},{text:`The lighting, the compositions, the colors—everything is perfect. Sumendra and his team were so non-intrusive yet managed to capture every key moment of our three-day celebration.`,name:`Rishabh & Kritika`,loc:`Grand Wedding, Mumbai`},{text:`We love the traditional yet modern feel of the photographs. The colors of the Kanjeevaram sarees and the temple architecture are so beautifully highlighted.`,name:`Dev & Priya`,loc:`South Indian Wedding, Chennai`},{text:`Amazing experience! The beach sunset portraits are breath-taking. Sumendra's understanding of natural light is superior. We could not have asked for a better photographer.`,name:`Karan & Natasha`,loc:`Destination Wedding, Thailand`},{text:`Full of life, energy, and joy! Sumendra captured the bhangra beats and late-night laughter in high spirits. The photo book is a luxury heirloom.`,name:`Aman & Simran`,loc:`Punjabi Wedding, Delhi`},{text:`Every photograph feels historic and grand. The way he uses the fort walls and arches to frame the couple is sheer art. Highly professional crew.`,name:`Yash & Tanvi`,loc:`Heritage Shoot, Gwalior`},{text:`Sumendra made our engagement shoot feel like a fun date. The candids are so genuine, and the fine-art edits are incredibly clean and elegant.`,name:`Siddharth & Shruti`,loc:`Engagement Session, Pune`},{text:`Even with heavy rain, Sumendra created magic. He used the rain and fog to create dramatic, romantic shots that look like they belong in a film.`,name:`Varun & Riya`,loc:`Monsoon Wedding, Lonavala`},{text:`The action shots on the dance floor are spectacular! Not a single blur, just crisp, dynamic captures of our friends and family celebrating.`,name:`Abhishek & Ritu`,loc:`Sangeet & Cocktail, Gurgaon`},{text:`Flawless execution. Sumendra is not just a photographer; he is a director of emotions. He captured the grand scale of the palace while preserving intimate closeups.`,name:`Manish & Payal`,loc:`Royal Heritage, Udaipur`},{text:`Beautiful, spiritual, and elegant. The Ganges and ghats backdrop portraits are divine. Thank you, Sumendra, for capturing our soul connection.`,name:`Rajesh & Sunita`,loc:`Traditional Vows, Rishikesh`}];function xx(){let[e,t]=(0,b.useState)(!1),[n,r]=(0,b.useState)(!1),[i,a]=(0,b.useState)(`home`),[o,s]=(0,b.useState)(`home`),c=(e,n)=>{if(n.preventDefault(),t(!1),o!==`home`)s(`home`),setTimeout(()=>{let t=document.getElementById(e);t&&t.scrollIntoView({behavior:`smooth`})},100);else{let t=document.getElementById(e);t&&t.scrollIntoView({behavior:`smooth`})}},[l,u]=(0,b.useState)(!0);(0,b.useEffect)(()=>{if(l){let e=setTimeout(()=>{u(!1)},5e3);return()=>clearTimeout(e)}},[l]);let d=(0,b.useMemo)(()=>[`Images/landing light mode 1.jpg`,`Images/landing light mode 2.jpg`,`Images/landing light mode 3.jpg`,`Images/landing light mode 4.jpg`],[]),f=(0,b.useMemo)(()=>[`Images/landing dark mode 1.jpg`,`Images/landing dark mode 2.jpg`,`Images/landing dark mode 3.jpg`,`Images/landing dark mode 4.jpg`],[]),[p,m]=(0,b.useState)(0);(0,b.useEffect)(()=>{let e=setInterv
